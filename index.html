  <text x="105" y="1145" font-size="14">"THE QUEST IS THE POINT. THE PERFECT SANDWICH MAY NOT EXIST."</text>

<div style="display:flex;gap:10px">
  <button onclick="exportPNG()">EXPORT PNG</button>
  <button onclick="exportPDF()">EXPORT PDF</button>
</div>

<script src="https://cdn.jsdelivr.net/npm/opentype.js@1.3.4/dist/opentype.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script>
let cachedFont = null;

async function loadFont() {
  if (cachedFont) return cachedFont;
  cachedFont = await opentype.load('./CarbonBold.ttf');
  return cachedFont;
}

async function svgWithPaths() {
  const font = await loadFont();
  const svgClone = document.getElementById('diagram').cloneNode(true);
  const texts = Array.from(svgClone.querySelectorAll('text'));

  texts.forEach(textEl => {
    const fontSize = parseFloat(textEl.getAttribute('font-size')) || 14;
    const x = parseFloat(textEl.getAttribute('x')) || 0;
    const y = parseFloat(textEl.getAttribute('y')) || 0;
    const anchor = textEl.getAttribute('text-anchor') || 'start';
    const transform = textEl.getAttribute('transform') || '';
    const content = textEl.textContent.toUpperCase();

    const measurePath = font.getPath(content, 0, 0, fontSize);
    const bbox = measurePath.getBoundingBox();
    const textWidth = bbox.x2 - bbox.x1;

    let adjustedX = x - bbox.x1;
    if (anchor === 'middle') adjustedX = x - textWidth / 2 - bbox.x1;
    else if (anchor === 'end') adjustedX = x - textWidth - bbox.x1;

    const finalPath = font.getPath(content, adjustedX, y, fontSize);
    const pathData = finalPath.toPathData(2);

    const pathEl = document.createElementNS('http://www.w3.org/2000/svg', 'path');
    pathEl.setAttribute('d', pathData);
    pathEl.setAttribute('fill', '#000');
    if (transform) pathEl.setAttribute('transform', transform);

    textEl.parentNode.replaceChild(pathEl, textEl);
  });

  return new XMLSerializer().serializeToString(svgClone);
}

async function exportPNG() {
  const data = await svgWithPaths();
  const canvas = document.createElement('canvas');
  const scale = 4;
  canvas.width = 555 * scale;
  canvas.height = 880 * scale;
  const ctx = canvas.getContext('2d');
  ctx.scale(scale, scale);
  const blob = new Blob([data], { type: 'image/svg+xml;charset=utf-8' });
  const url = URL.createObjectURL(blob);
  const img = new Image();
  img.onload = function() {
    ctx.drawImage(img, 0, 0, 555, 880);
    URL.revokeObjectURL(url);
    const a = document.createElement('a');
    a.download = 'compendium-sandwich.png';
    a.href = canvas.toDataURL('image/png');
    a.click();
  };
  img.src = url;
}

async function exportPDF() {
  const data = await svgWithPaths();
  const canvas = document.createElement('canvas');
  const scale = 4;
  const w = 555, h = 880;
  canvas.width = w * scale;
  canvas.height = h * scale;
  const ctx = canvas.getContext('2d');
  ctx.scale(scale, scale);
  const blob = new Blob([data], { type: 'image/svg+xml;charset=utf-8' });
  const url = URL.createObjectURL(blob);
  const img = new Image();
  img.onload = function() {
    ctx.drawImage(img, 0, 0, w, h);
    URL.revokeObjectURL(url);
    const imgData = canvas.toDataURL('image/png');
    const pdf = new jspdf.jsPDF({ orientation: 'portrait', unit: 'px', format: [w, h] });
    pdf.addImage(imgData, 'PNG', 0, 0, w, h);
    pdf.save('compendium-sandwich.pdf');
  };
  img.src = url;
}
</script>

</body>
